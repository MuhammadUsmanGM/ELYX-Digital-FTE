name: Auto-Sync Vault

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout vault
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Configure Git
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
    
    - name: Check for changes
      id: git_status
      run: |
        git remote add sync https://github.com/MuhammadUsmanGM/obsidian_vault.git
        git fetch sync
        git status --porcelain
        if [[ -n "$(git status --porcelain)" ]]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit and push if changed
      if: steps.git_status.outputs.has_changes == 'true'
      run: |
        git add .
        git commit -m "Auto-sync: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
        git push sync main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: No changes
      if: steps.git_status.outputs.has_changes == 'false'
      run: echo "✓ No changes to sync"
