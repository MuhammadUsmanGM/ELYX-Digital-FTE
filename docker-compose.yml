version: '3.8'

services:
  ai-employee:
    build: .
    container_name: ai-employee-system
    ports:
      - "8000:8000"  # API server
      - "3000:3000"  # Frontend (if running)
    volumes:
      - ./obsidian_vault:/app/obsidian_vault  # Mount vault for persistent data
      - ./config:/app/config  # Mount config directory
      - ./logs:/app/logs  # Mount logs directory
    environment:
      - VAULT_PATH=/app/obsidian_vault
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN}
      - GMAIL_USER_EMAIL=${GMAIL_USER_EMAIL}
      - LINKEDIN_USERNAME=${LINKEDIN_USERNAME}
      - LINKEDIN_PASSWORD=${LINKEDIN_PASSWORD}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - DATABASE_URL=sqlite:////app/obsidian_vault/employee_system.db
    networks:
      - ai-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-employee-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://ai-employee:8000/api
      - NODE_ENV=production
    depends_on:
      - ai-employee
    networks:
      - ai-network
    restart: unless-stopped

networks:
  ai-network:
    driver: bridge

volumes:
  vault_data:
  config_data:
  logs_data: