name: Auto-Sync Vault

# Automatically sync obsidian_vault to GitHub every hour
# Also triggers on push to main branch

on:
  schedule:
    # Run every hour at minute 0
    - cron: '0 * * * *'
  
  # Allow manual trigger
  workflow_dispatch:
  
  # Also sync on push (for local commits)
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout vault
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Configure Git
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
    
    - name: Check for changes
      id: git_status
      run: |
        git status --porcelain
        if [[ -n "$(git status --porcelain)" ]]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit and push if changed
      if: steps.git_status.outputs.has_changes == 'true'
      run: |
        git add .
        git commit -m "Auto-sync: $(date +'%Y-%m-%d %H:%M:%S') [GitHub Actions]" || echo "No changes to commit"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: No changes
      if: steps.git_status.outputs.has_changes == 'false'
      run: |
        echo "✅ No changes to sync"
        echo "Vault is up to date!"
